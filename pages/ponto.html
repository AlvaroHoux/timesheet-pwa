<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/timesheet-pwa/manifest.json" />
    <meta name="theme-color" content="#1e1e1e" />
    <link
      rel="apple-touch-icon"
      href="/timesheet-pwa/assets/icon-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      href="/timesheet-pwa/assets/icon-192x192.png"
    />
    <title>Registro de Ponto</title>
    <link rel="stylesheet" href="../styles/ponto.css" />
    <link rel="stylesheet" href="../styles/modal.css" />
  </head>
  <body>
    <div id="splashScreen">
      <img
        src="../assets/icon-192x192.png"
        alt="Logo Meu Ponto"
        class="splash-icon"
      />
      <div class="splash-title">Iniciando Ponto...</div>
    </div>

    <div class="top-bar">
      <select id="estadoDropdown" class="estado-dropdown">
        <option value="0">Não Iniciado</option>
        <option value="1">Trabalhando (Turno 1)</option>
        <option value="2">Em Horário de Almoço</option>
        <option value="3">Trabalhando (Turno 2)</option>
      </select>
      <button
        id="btnEditarHoje"
        class="btn-editar-hoje"
        aria-label="Editar Horários de Hoje"
      >
        ✏️
      </button>
    </div>

    <div class="main-button-container">
      <button id="btnPonto" class="btn-ponto">
        <div id="clockDisplay" class="clock-display">00:00:00</div>
        <div id="statusDisplay" class="status-display">Carregando...</div>
        <div id="countdownDisplay" class="countdown-display">--:--:--</div>
      </button>

      <button id="btnCancelarDia" class="btn-cancelar-dia">
        <span>🗑️ Segure por 3s para cancelar o dia atual</span>
      </button>
    </div>

    <div class="bottom-container">
      <button
        class="btn-historico"
        onclick="window.location.href = 'registros.html'"
      >
        Registros 📋
      </button>
      <button class="btn-config" aria-label="Configurações">⚙️</button>
    </div>

    <dialog id="modalEdicaoHoje">
      <div
        class="modal-header"
        style="
          font-size: 1.2rem;
          font-weight: bold;
          margin-bottom: 15px;
          color: var(--primary-color);
        "
      >
        Editar Dia Atual
      </div>
      <form id="formEdicaoHoje">
        <div class="form-group">
          <label>Entrada (Turno 1)</label>
          <input type="time" id="inputEntradaHoje" />
        </div>
        <div class="form-group">
          <label>Saída para Almoço</label>
          <input type="time" id="inputSaidaAlmocoHoje" />
        </div>
        <div class="form-group">
          <label>Retorno do Almoço</label>
          <input type="time" id="inputRetornoAlmocoHoje" />
        </div>
        <div class="modal-actions">
          <button
            type="button"
            class="btn-modal btn-cancelar"
            id="btnCancelarEdicaoHoje"
          >
            Cancelar
          </button>
          <button type="submit" class="btn-modal btn-salvar">
            Salvar Horários
          </button>
        </div>
      </form>
    </dialog>
    <dialog id="modalConfig">
      <div
        class="modal-header"
        style="
          font-size: 1.2rem;
          font-weight: bold;
          margin-bottom: 15px;
          color: var(--primary-color);
        "
      >
        Configurações
      </div>
      <form id="formConfig">
        <div class="form-group">
          <label>Carga Horária Diária</label>
          <div style="display: flex; gap: 10px">
            <input
              type="number"
              id="inputHorasCarga"
              placeholder="Horas"
              min="0"
              max="24"
              required
              style="
                width: 50%;
                background-color: #121212;
                border: 1px solid #333;
                color: white;
                padding: 10px;
                border-radius: 8px;
              "
            />
            <input
              type="number"
              id="inputMinutosCarga"
              placeholder="Minutos"
              min="0"
              max="59"
              required
              style="
                width: 50%;
                background-color: #121212;
                border: 1px solid #333;
                color: white;
                padding: 10px;
                border-radius: 8px;
              "
            />
          </div>
        </div>
        <div class="modal-actions">
          <button
            type="button"
            class="btn-modal btn-cancelar"
            id="btnCancelarConfig"
          >
            Cancelar
          </button>
          <button type="submit" class="btn-modal btn-salvar">Salvar</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="../dist/ponto.js"></script>
    <script type="module" src="../dist/sw-register.js"></script>
  </body>
</html>
